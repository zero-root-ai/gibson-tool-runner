name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: build binary
        run: CGO_ENABLED=0 go build -o bin/gibson-runner ./cmd/gibson-runner

      - name: --list-tools outputs valid JSON
        run: |
          ./bin/gibson-runner --list-tools | jq . >/dev/null
          echo "Parsers advertised:"
          ./bin/gibson-runner --list-tools | jq -r '.[].name'

      - name: race tests
        run: go test -race ./...
